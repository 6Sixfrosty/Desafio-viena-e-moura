
<div id="erd" style="padding: 1rem 0"></div>
<style>
#erd svg { width: 100%; }
</style>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  DEPARTAMENTOS {
    int id_departamento PK
    varchar nome
  }
  FUNCOES {
    int id_funcao PK
    varchar nome
  }
  COLABORADORES {
    int id_colaborador PK
    int id_departamento FK
    int id_funcao FK
    varchar nome
    varchar cpf
  }
  UNIDADES {
    int id_unidade PK
    varchar tipo
    date data_inicio
  }
  ETAPAS {
    int id_etapa PK
    int ordem
    varchar nome
  }
  ALOCACAO_COLABORADORES {
    int id_alocacao PK
    int id_colaborador FK
    int id_unidade FK
  }
  PROGRESSAO_UNIDADE {
    int id_progressao PK
    int id_unidade FK
    int id_etapa FK
    int id_alocacao FK
  }
  REGISTRO_DIARIO {
    int id_registro PK
    int id_colaborador
    int id_unidade
    int id_etapa
    date data
    time horario_entrada
    time horario_saida
  }
  MATERIAIS {
    int id_material PK
    varchar nome
    varchar unidade_medida
  }
  ARMAZEM {
    int id_armazem PK
    int id_material FK
    int saldo_atual
    int sobras
    int destrocos
  }
  MOVIMENTACOES_ARMAZEM {
    int id_movimentacao PK
    int id_armazem FK
    varchar tipo
    int quantidade
    date data
    varchar fornecedor
  }
  PEDIDOS {
    int id_pedido PK
    int id_unidade FK
    int id_material FK
    int quantidade_solicitada
    int quantidade_devolvida
    date data_pedido
  }
  PEDIDOS_DETALHES {
    int id_detalhe PK
    int id_pedido FK
    int id_colaborador
    int id_etapa
    timestamp data_hora
  }

  DEPARTAMENTOS ||--o{ COLABORADORES : "pertence a"
  FUNCOES ||--o{ COLABORADORES : "exerce"
  COLABORADORES ||--o{ ALOCACAO_COLABORADORES : "alocado em"
  UNIDADES ||--o{ ALOCACAO_COLABORADORES : "recebe"
  ALOCACAO_COLABORADORES ||--o{ PROGRESSAO_UNIDADE : "executa"
  UNIDADES ||--o{ PROGRESSAO_UNIDADE : "tem"
  ETAPAS ||--o{ PROGRESSAO_UNIDADE : "compoe"
  MATERIAIS ||--o{ ARMAZEM : "estocado em"
  ARMAZEM ||--o{ MOVIMENTACOES_ARMAZEM : "registra"
  UNIDADES ||--o{ PEDIDOS : "solicita"
  MATERIAIS ||--o{ PEDIDOS : "pedido de"
  PEDIDOS ||--o{ PEDIDOS_DETALHES : "detalhado em"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Bootstrap 5 + Icons + Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">

    <!-- Estilos customizados do projeto -->
    <link rel="stylesheet" href="../shared/styles/main.css">

    <!-- Bootstrap JS (necessário para modais e dropdowns) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <header class="login-header">
                <div class="login-icon">
                    <i class="bi bi-building"></i>
                </div>
                <h2 class="fw-bold mt-3">Sistema de Gestão</h2>
                <p class="text-muted">Construção Civil</p>
            </header>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Usuário</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-person"></i></span>
                        <input type="text" id="username" class="form-control" placeholder="Digite seu usuário" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-lock"></i></span>
                        <input type="password" id="password" class="form-control" placeholder="Digite sua senha"
                            required>
                    </div>
                </div>
                <button type="submit" class="btn btn-login w-100 text-white">
                    <i class="bi bi-box-arrow-in-right"></i> Entrar no Sistema
                </button>
            </form>

            <hr class="my-4">
            <div class="text-center mb-3">
                <small class="text-muted">Acessos Demo (clique para testar)</small>
            </div>

            <div class="perfil-demo" onclick="login('mestre')">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-hard-hat fs-3 text-warning"></i>
                    <div>
                        <strong>👷 Mestre de Obras</strong>
                        <div class="small text-muted">Acesso: Checklist + Solicitações</div>
                    </div>
                </div>
            </div>

            <div class="perfil-demo mt-2" onclick="login('almoxarife')">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-box-seam fs-3 text-success"></i>
                    <div>
                        <strong>📦 Almoxarife</strong>
                        <div class="small text-muted">Acesso: Solicitações + Estoque</div>
                    </div>
                </div>
            </div>
        </div>
        <script src="login.js"></script>
</body>

</html>
